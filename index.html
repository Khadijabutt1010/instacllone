<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Instagram Clone</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="wrapper">
    <div class="content">
        <h1 class="logo">Instagram</h1>
        <p class="tagline">
            Share 
            <span class="gradient-text">everyday moments</span>
            with your close friends.
        </p>
        <button class="main-btn">Open Instagram</button>
        <p class="links">
            <a href="#">Log In</a> or 
            <a href="#">Sign Up</a>
        </p>
    </div>
</div>
</body>
</html>
